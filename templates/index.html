<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIO AI | Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Pure Black Background */
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        
        .sidebar { 
            background-color: #000000; 
            width: 260px; 
            border-right: 1px solid #1a1a1a; 
            transition: all 0.3s ease;
        }
        
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }

        .main-content { background-color: #000000; flex: 1; position: relative; }
        
        /* 🔵 Back to Original Blue/Cyan Gradient */
        .trio-logo {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to right, #3b82f6, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            letter-spacing: 3px;
        }

        /* All other UI text to Pure White */
        .ui-text-white { color: #ffffff !important; }
        .history-item { color: #ffffff; opacity: 0.6; transition: 0.2s; }
        .history-item:hover { background-color: #111; opacity: 1; }

        .chat-bubble-user { background-color: #262626; border-radius: 20px 20px 4px 20px; padding: 12px 18px; max-width: 80%; color: #ffffff; }
        .chat-bubble-ai { background-color: transparent; padding: 12px 0; max-width: 90%; line-height: 1.7; color: #ffffff; }
        
        input { background-color: #121212 !important; border: 1px solid #222 !important; color: #ffffff !important; }
        input::placeholder { color: #666; }
        
        .new-chat-btn { border: 1px solid #333; color: #ffffff; }
        .new-chat-btn:hover { background-color: #111; border-color: #444; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebar" class="sidebar flex flex-col p-4 z-20">
        <div class="flex justify-between items-center mb-6">
            <span class="text-xs font-bold uppercase tracking-widest text-white opacity-50">History</span>
            <button onclick="toggleSidebar()" class="text-white hover:text-blue-400"><i class="fa fa-xmark"></i></button>
        </div>
        <button onclick="location.reload()" class="new-chat-btn flex items-center gap-3 rounded-lg p-3 transition mb-6 text-sm font-bold">
            <i class="fa fa-plus text-xs"></i> NEW CHAT
        </button>
        <div class="flex-1 overflow-y-auto space-y-1" id="history-list">
            </div>
    </div>

    <div class="main-content flex flex-col">
        
        <header class="flex justify-between items-center px-6 py-4 border-b border-zinc-900">
            <button id="menu-btn" onclick="toggleSidebar()" class="text-white hover:text-blue-400 hidden">
                <i class="fa fa-bars text-xl"></i>
            </button>
            <div class="flex-1 text-center">
                <h1 class="trio-logo">TRIO AI</h1>
            </div>
            <div class="w-8"></div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 md:px-64 space-y-10 pt-10 pb-40">
            <div id="welcome-msg" class="text-center mt-20">
                <p class="text-[10px] tracking-widest uppercase text-blue-500 font-bold">Intelligent Systems v12.0</p>
                <h2 class="text-3xl font-bold mt-4 text-white">How can I assist you?</h2>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-6 bg-black">
            <div class="max-w-3xl mx-auto relative">
                <input id="user-input" type="text" placeholder="Type your message..." 
                    class="w-full text-white p-4 pr-16 rounded-xl focus:outline-none transition-all">
                <button onclick="send()" class="absolute right-3 top-3 bg-white text-black h-10 w-10 rounded-lg hover:bg-blue-400 transition flex items-center justify-center">
                    <i class="fa fa-arrow-up"></i>
                </button>
            </div>
            <p class="text-[9px] text-center mt-4 text-zinc-600 uppercase tracking-widest">Powered by Trio AI Marketplace</p>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const historyList = document.getElementById('history-list');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                menuBtn.classList.remove('hidden');
            } else {
                menuBtn.classList.add('hidden');
            }
        }

        async function send() {
            const text = userInput.value.trim();
            if (!text) return;

            document.getElementById('welcome-msg')?.remove();

            chatWindow.innerHTML += `
                <div class="flex justify-end">
                    <div class="chat-bubble-user text-sm">${text}</div>
                </div>`;
            
            userInput.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const loadingId = "ai-" + Date.now();
            chatWindow.innerHTML += `
                <div class="flex gap-6 items-start" id="${loadingId}">
                    <div class="text-blue-500 font-bold text-[10px] pt-1 tracking-tighter">TRIO</div>
                    <div class="chat-bubble-ai text-sm text-white opacity-90">Processing...</div>
                </div>`;

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                const data = await res.json();
                
                const aiDiv = document.getElementById(loadingId);
                aiDiv.querySelector('.chat-bubble-ai').innerHTML = data.answer.replace(/\n/g, '<br>');
                
                const item = document.createElement('div');
                item.className = 'history-item p-3 text-xs truncate cursor-pointer';
                item.innerHTML = `<i class="fa fa-message mr-3 opacity-30 text-blue-400"></i> ${text}`;
                historyList.prepend(item);

            } catch (err) {
                document.getElementById(loadingId).querySelector('.chat-bubble-ai').innerHTML = "Connectivity Error.";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
